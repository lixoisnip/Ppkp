name: PZU analysis

on:
  workflow_dispatch:
  push:
    paths:
      - "*.PZU"
      - "scripts/*.py"
      - ".github/workflows/pzu-analysis.yml"
      - "README.md"
      - "docs/script_scope_matrix.csv"

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Compile Python scripts
        run: python3 -m py_compile scripts/*.py
      - name: Run analysis smoke test
        run: python3 scripts/run_analysis_smoke_test.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pzu-analysis
          path: |
            docs/analysis_smoke_test_results.csv
            docs/analysis_health_report.md
            docs/script_scope_matrix.csv
            docs/firmware_manifest.json
            docs/firmware_inventory.csv
            docs/firmware_family_matrix.csv
            docs/xdata_xref.csv
            docs/disassembly_index.csv
            docs/call_xref.csv
            docs/basic_block_map.csv
            docs/function_map.csv
            docs/string_index.csv
